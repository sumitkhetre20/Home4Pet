#########################################
# Application
#########################################
spring.application.name=home4pet

#########################################
# Server
#########################################
server.port=8080
server.servlet.context-path=/api/v1

#########################################
# Database
#########################################
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#########################################
# JPA
#########################################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#########################################
# JWT
#########################################
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

#########################################
# CORS
#########################################
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000

#########################################
# File Uploads
#########################################
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

#########################################
# Spring Security Seed
#########################################
app.seed.enabled=true
app.seed.admin-email=${ADMIN_EMAIL}
app.seed.admin-password=${ADMIN_PASSWORD}

#########################################
# Actuator
#########################################
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

#########################################
# OpenAPI / Swagger
#########################################
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

#########################################
# Stripe Payment
#########################################
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:5173/payment/success}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:5173/payment/cancel}

#########################################
# Groq AI Chatbot
#########################################
app.groq.api-key=${GROQ_API_KEY}
app.groq.model=llama-3.3-70b-versatile
app.groq.api-url=https://api.groq.com/openai/v1/chat/completions
app.groq.max-history-messages=20
app.groq.temperature=0.7
app.groq.max-tokens=1024